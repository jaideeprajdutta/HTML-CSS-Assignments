<html>
    <head>
        <title>Elevenlabs | Signup</title>
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #ffffff;
                color: #000000;
                padding: 0;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div style="min-height: 100vh; display: flex; flex-direction: column;">
            
            <div style="padding: 20px; font-weight: 800; font-size: 18px; text-align: center;">
                ElevenLabs
            </div>
            
            <div style="flex: 1; display: flex; justify-content: center; align-items: center; flex-direction: column;">
                
                <div style="width: 350px; display: flex; flex-direction: column;">
                    
                    <h1 style="font-size: 24px; text-align: center; margin-bottom: 30px;">Create an account</h1>    
                    
                    <button style="background-color: transparent; 
                                   border: 1px solid #e0e0e0;
                                   padding: 12px; 
                                   border-radius: 8px;
                                   width: 100%;
                                   color: #000; 
                                   font-size: 14px; 
                                   font-weight: 600; 
                                   cursor: pointer;
                                   display: flex;
                                   align-items: center;
                                   justify-content: space-between;
                                   margin-bottom: 20px;"> 
                        <img src="Googlelogo.jpg" alt="G" style="width: 18px;">
                        <span style="flex-grow: 1; text-align: center;">Sign up with Google</span>
                        <div style="width: 18px;"></div>
                    </button>

                    <div style="height: 1px; background-color: #f0f0f0; margin-bottom: 25px;"></div>
                    
                    <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">Email</label>
                    <input type="email" style="border: 1px solid #e5e7eb; padding: 14px; border-radius: 8px; margin-bottom: 20px; outline: none;" />
                    
                    <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">Password</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" style="border: 1px solid #e5e7eb; padding: 14px; border-radius: 8px; width: 100%; outline: none;" />
                        <span style="position: absolute; right: 15px; color: #9ca3af; cursor: pointer;">👁</span>
                    </div>
                    
                    <button style="margin-top: 30px; 
                                   padding: 15px; 
                                   background-color: #adb0bb; 
                                   color: white; 
                                   border: none; 
                                   border-radius: 8px; 
                                   font-size: 16px;
                                   font-weight: 600;
                                   cursor: pointer;">
                        Sign up
                    </button>

                    <p style="text-align: center; font-size: 14px; margin-top: 20px; color: #555;">
                        Already registered? <a href="#" style="color: black; font-weight: 600; text-decoration: underline;">Sign in</a>
                    </p>
                </div>    
            </div>        
            
            <div style="padding: 20px; text-align: center; font-size: 11px; color: #888;">
                By continuing, you agree to our Terms of Service and Privacy Policy.
            </div>
            
        </div>
    </body>
</html>
